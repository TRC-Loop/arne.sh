# GDPR-friendly log format — no IP addresses stored
log_format gdpr '$time_iso8601 "$request" $status $body_bytes_sent "$http_referer"';

# Rate limit: 5 req/s per IP (18000/h) — loose enough for normal use,
# still blocks bots and hammering. Zone: 1m ≈ 16k tracked IPs.
limit_req_zone $binary_remote_addr zone=general:1m rate=5r/s;
limit_req_status 429;

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log gdpr;

    root /usr/share/nginx/html;
    index index.html;

    # Main site
    location / {
        limit_req zone=general burst=50 nodelay;
        try_files $uri $uri/ =404;
    }

    # File browser — password-protected, scoped uploads & downloads
    location /files {
        limit_req zone=general burst=100 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rewrite absolute redirects from the internal address to the public host
        proxy_redirect http://127.0.0.1:8080/ $scheme://$host/;

        # Allow large uploads; disable buffering so upload progress works
        client_max_body_size    0;
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_read_timeout      300s;
    }
}
