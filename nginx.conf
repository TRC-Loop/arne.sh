load_module /usr/lib/nginx/modules/ngx_http_fancyindex_module.so;

user nginx;
worker_processes auto;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # GDPR-friendly log format — no IP addresses stored
    log_format gdpr '$time_iso8601 "$request" $status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log gdpr;

    # Rate limit: 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=general:1m rate=30r/s;
    limit_req_status 429;

    server {
        listen 80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # Main site
        location / {
            limit_req zone=general burst=200 nodelay;
            try_files $uri $uri/ =404;
        }

        # Public file listing — browse folders, direct downloads, no upload
        location /stone/ {
            limit_req zone=general burst=200 nodelay;
            alias /srv/;

            fancyindex             on;
            fancyindex_exact_size  off;
            fancyindex_localtime   on;
            fancyindex_name_length 255;
            fancyindex_css_href    "/.fancyindex/style.css";
            fancyindex_header      "/.fancyindex/header.html";
            fancyindex_footer      "/.fancyindex/footer.html";
            charset                utf-8;
        }

        # Discord invite redirect
        location = /discord {
            return 301 https://discord.gg/tDS3UkAgXu;
        }

        # Redirect /stone → /stone/
        location = /stone {
            return 301 /stone/;
        }

        # Admin upload interface — filebrowser with its own login
        location = /upload {
            return 301 /upload/;
        }

        location /upload/ {
            limit_req zone=general burst=500 nodelay;

            proxy_pass         http://127.0.0.1:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     http://127.0.0.1:8080/ $scheme://$host/;

            client_max_body_size    0;
            proxy_request_buffering off;
            proxy_buffering         off;
            proxy_read_timeout      300s;
        }
    }
}
